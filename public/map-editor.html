<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dofus Retro - Editeur de carte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    color: #D4C48A;
    font-family: "Gill Sans", Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  #topbar {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    right: 0;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 12px;
    background: rgba(42, 37, 21, 0.95);
    border-bottom: 1px solid rgba(191, 176, 123, 0.25);
  }

  .topbar-left,
  .topbar-center,
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .topbar-left { flex: 1 1 auto; }
  .topbar-center { flex: 0 1 auto; }
  .topbar-right { flex: 0 0 auto; }

  .back-link {
    color: #BFB07B;
    text-decoration: none;
    font: 12px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    padding: 4px 10px;
    border: 1px solid rgba(191, 176, 123, 0.3);
    border-radius: 4px;
    white-space: nowrap;
  }
  .back-link:hover { background: rgba(191, 176, 123, 0.1); }

  #map-title-input {
    min-width: 120px;
    width: 220px;
    max-width: 34vw;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(191, 176, 123, 0.4);
    color: #D4C48A;
    font: 14px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    outline: none;
    padding: 2px 4px;
  }
  #map-title-input:focus { border-bottom-color: #BFB07B; }

  .visibility-control {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #BFB07B;
    font: 11px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .visibility-control input { accent-color: #2a7a2a; }

  .readonly-badge {
    display: none;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(191, 176, 123, 0.35);
    color: #D4C48A;
    font: 10px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  body.readonly #readonly-badge { display: inline-block; }
  body.readonly #map-title-input { pointer-events: none; opacity: 0.75; }
  body.readonly #toolbar .tool-btn,
  body.readonly #toolbar .color-swatch,
  body.readonly #toolbar .icon-btn,
  body.readonly #custom-color {
    opacity: 0.45;
    pointer-events: none;
  }
  body.readonly #tool-pan { opacity: 1; pointer-events: auto; }

  #selection-status {
    color: #D4C48A;
    opacity: 0.8;
    font: 11px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  #save-status {
    color: #BFB07B;
    opacity: 0.75;
    font-size: 11px;
    font-style: italic;
    white-space: nowrap;
  }

  .btn-save,
  .zoom-btn {
    min-height: 26px;
    border-radius: 4px;
    font-family: Cinzel, Georgia, serif;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-save {
    padding: 5px 14px;
    background: #58533A;
    color: #D4C48A;
    border: 1px solid #8A7A50;
    font-size: 12px;
    font-weight: 700;
  }
  .btn-save:hover { background: #6e6849; }
  .btn-save:disabled { opacity: 0.5; cursor: default; }

  .zoom-control {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 2px;
    border: 1px solid rgba(191, 176, 123, 0.28);
    border-radius: 4px;
    background: rgba(20, 16, 6, 0.18);
  }
  .zoom-btn {
    min-width: 28px;
    height: 24px;
    padding: 0 7px;
    background: transparent;
    color: #D4C48A;
    border: 1px solid transparent;
    font-size: 11px;
  }
  .zoom-btn:hover {
    background: rgba(191, 176, 123, 0.12);
    border-color: rgba(191, 176, 123, 0.3);
  }
  #zoom-label {
    min-width: 44px;
    text-align: center;
    color: #BFB07B;
    font: 12px Consolas, monospace;
  }
  #coords-bar {
    color: #BFB07B;
    opacity: 0.8;
    font: 12px Consolas, monospace;
    white-space: nowrap;
  }

  #toolbar {
    position: fixed;
    z-index: 900;
    left: 0;
    top: 40px;
    bottom: 0;
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 0;
    overflow-y: auto;
    background: rgba(42, 37, 21, 0.95);
    border-right: 1px solid rgba(191, 176, 123, 0.2);
  }
  .tool-sep {
    width: 40px;
    height: 1px;
    margin: 4px 0;
    background: rgba(191, 176, 123, 0.2);
  }
  .tool-label {
    margin-top: 2px;
    color: #8A7A50;
    font: 8px Cinzel, Georgia, serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tool-btn {
    width: 44px;
    height: 44px;
    border: 1px solid transparent;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .tool-btn:hover { background: rgba(191, 176, 123, 0.12); }
  .tool-btn.active { background: rgba(191, 176, 123, 0.2); border-color: #8A7A50; }
  .tool-btn .icon-lbl { font-size: 18px; line-height: 1; }
  .tool-btn .tool-name {
    color: #8A7A50;
    font: 7px Cinzel, Georgia, serif;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tool-btn.active .tool-name { color: #BFB07B; }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(2, 18px);
    gap: 3px;
    padding: 4px;
  }
  .color-swatch {
    width: 18px;
    height: 18px;
    border: 1px solid rgba(0, 0, 0, 0.3);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .color-swatch:hover { transform: scale(1.16); }
  .color-swatch.active { box-shadow: 0 0 0 2px #BFB07B; transform: scale(1.12); }
  #custom-color {
    width: 38px;
    height: 22px;
    padding: 0;
    border: 1px solid #8A7A50;
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    width: 58px;
    padding: 4px;
  }
  .icon-btn {
    width: 26px;
    height: 26px;
    border: 1px solid transparent;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.1s;
  }
  .icon-btn:hover { background: rgba(191, 176, 123, 0.15); }
  .icon-btn.active { background: rgba(191, 176, 123, 0.25); border-color: #8A7A50; }

  #viewport {
    position: fixed;
    top: 40px;
    left: 64px;
    right: 0;
    bottom: 0;
    overflow: hidden;
    background: #111;
  }
  #leaflet-map {
    width: 100%;
    height: 100%;
    background: #111;
  }
  .leaflet-container {
    font: inherit;
    cursor: grab;
  }
  .leaflet-container.leaflet-dragging { cursor: grabbing; }
  #viewport.tool-active .leaflet-container { cursor: crosshair; }
  .leaflet-control-attribution { display: none; }
  .leaflet-control-zoom { display: none; }
  .leaflet-image-layer { image-rendering: auto; }

  .map-cell-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 2;
  }
  .map-cell-overlay svg {
    display: block;
    width: 100%;
    height: 100%;
  }
  .map-grid-line,
  .map-cell-rect,
  .map-selection-rect,
  .map-hover-rect {
    vector-effect: non-scaling-stroke;
  }
  .map-cell-icon {
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
    font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    font-size: 18px;
    paint-order: stroke;
    stroke: rgba(0, 0, 0, 0.55);
    stroke-width: 2px;
    stroke-linejoin: round;
  }

  #tooltip {
    position: fixed;
    z-index: 1400;
    left: 0;
    top: 0;
    padding: 5px 8px;
    border: 1px solid rgba(245, 229, 184, 0.35);
    border-radius: 4px;
    background: rgba(28, 23, 13, 0.86);
    color: #F5E5B8;
    box-shadow: none;
    font: 12px Consolas, monospace;
    pointer-events: none;
    transform: translate3d(-9999px, -9999px, 0);
    will-change: transform;
  }
  #tooltip.is-hidden { opacity: 0; }

  #note-popup {
    display: none;
    position: fixed;
    z-index: 1500;
    width: 200px;
    padding: 10px;
    border: 1px solid #8A7A50;
    border-radius: 5px;
    background: #2A2515;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  }
  #note-input {
    width: 100%;
    height: 60px;
    resize: none;
    outline: none;
    padding: 6px 8px;
    border: 1px solid #8A7A50;
    border-radius: 4px;
    background: #3A3520;
    color: #D4C48A;
    font: 13px Georgia, serif;
  }
  .note-popup-btns { display: flex; gap: 6px; margin-top: 6px; }
  .btn-note {
    flex: 1;
    padding: 4px;
    border: 1px solid #8A7A50;
    border-radius: 4px;
    background: #58533A;
    color: #BFB07B;
    cursor: pointer;
    font: 11px Cinzel, Georgia, serif;
    letter-spacing: 1px;
  }
  .btn-note.cancel { background: transparent; color: #8A7A50; }

  @media (max-width: 900px) {
    #topbar {
      min-height: 82px;
      flex-wrap: wrap;
      align-content: center;
      padding: 6px 8px;
      gap: 6px;
    }
    .topbar-left,
    .topbar-center,
    .topbar-right {
      flex: 1 1 auto;
      min-width: min(100%, 260px);
    }
    .topbar-center {
      order: 3;
      width: 100%;
      justify-content: flex-start;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .topbar-right { justify-content: space-between; }
    #map-title-input { width: min(180px, 42vw); }
    #toolbar { top: 82px; width: 56px; }
    #viewport { top: 82px; left: 56px; }
    .tool-btn { width: 40px; height: 40px; }
    .icon-grid { width: 52px; }
    .icon-btn { width: 23px; height: 23px; }
  }

  @media (max-width: 560px) {
    #topbar { min-height: 118px; align-items: flex-start; }
    .topbar-left,
    .topbar-right { width: 100%; }
    .back-link { padding: 4px 8px; font-size: 11px; }
    #map-title-input {
      flex: 1;
      width: auto;
      min-width: 0;
      max-width: none;
      font-size: 13px;
    }
    #coords-bar { display: none; }
    #toolbar { top: 118px; width: 52px; }
    #viewport { top: 118px; left: 52px; }
    #note-popup { width: min(200px, calc(100vw - 24px)); }
  }
</style>
</head>
<body>
<div id="topbar">
  <div class="topbar-left">
    <a href="maps.html" class="back-link">← Mes cartes</a>
    <input id="map-title-input" type="text" value="Chargement..." maxlength="60" title="Cliquer pour renommer">
  </div>
  <div class="topbar-center">
    <label class="visibility-control" id="visibility-control">
      <input id="map-public-toggle" type="checkbox">
      Public
    </label>
    <span class="readonly-badge" id="readonly-badge">Lecture seule</span>
    <span id="selection-status">0 case</span>
    <span id="save-status">Non sauvegardé</span>
    <button class="btn-save" id="btn-save">Sauvegarder</button>
  </div>
  <div class="topbar-right">
    <div class="zoom-control" title="Molette pour zoomer">
      <button class="zoom-btn" id="zoom-out" type="button">-</button>
      <span id="zoom-label">100%</span>
      <button class="zoom-btn" id="zoom-in" type="button">+</button>
      <button class="zoom-btn" id="zoom-reset" type="button">100</button>
    </div>
    <span id="coords-bar">[-, -]</span>
  </div>
</div>

<div id="toolbar">
  <span class="tool-label">Outil</span>
  <button class="tool-btn active" id="tool-pan" onclick="setTool('pan')" title="Déplacer la carte">
    <span class="icon-lbl">✋</span>
    <span class="tool-name">Pan</span>
  </button>
  <button class="tool-btn" id="tool-color" onclick="setTool('color')" title="Colorier une case">
    <span class="icon-lbl">🎨</span>
    <span class="tool-name">Couleur</span>
  </button>
  <button class="tool-btn" id="tool-icon" onclick="setTool('icon')" title="Ajouter une icône">
    <span class="icon-lbl">📍</span>
    <span class="tool-name">Icône</span>
  </button>
  <button class="tool-btn" id="tool-note" onclick="setTool('note')" title="Ajouter une note">
    <span class="icon-lbl">📝</span>
    <span class="tool-name">Note</span>
  </button>

  <div class="tool-sep"></div>
  <span class="tool-label">Couleurs</span>
  <div class="color-grid" id="color-grid"></div>
  <input type="color" id="custom-color" value="#ff6600" title="Couleur personnalisée">

  <div class="tool-sep"></div>
  <span class="tool-label">Icônes</span>
  <div class="icon-grid" id="icon-grid"></div>
</div>

<div id="viewport">
  <div id="leaflet-map"></div>
</div>

<div id="tooltip" class="is-hidden"></div>
<div id="note-popup">
  <textarea id="note-input" placeholder="Votre note..."></textarea>
  <div class="note-popup-btns">
    <button class="btn-note" id="btn-note-ok">OK</button>
    <button class="btn-note cancel" id="btn-note-cancel">Annuler</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import './js/supabase-api.js';

(function () {
const X_MIN = -91, X_MAX = 43;
const Y_MIN = -120, Y_MAX = 48;
const COLS = X_MAX - X_MIN + 1;
const ROWS = Y_MAX - Y_MIN + 1;
const PITCH_N = 39, PITCH_W = 40, ROW_PITCH = 23;
const IMAGE_WIDTH = 5359;
const IMAGE_HEIGHT = 3869;
const MAP_WIDTH = IMAGE_WIDTH;
const MAP_HEIGHT = IMAGE_HEIGHT;
const ZOOM_STEP = 0.25;
const ABSOLUTE_MIN_ZOOM = -2;
const MAX_ZOOM = 3;
const bounds = L.latLngBounds([[-MAP_HEIGHT, 0], [0, MAP_WIDTH]]);
const SVG_NS = 'http://www.w3.org/2000/svg';

const colLeft = [0];
for (let c = 1; c < COLS; c++) {
  colLeft[c] = colLeft[c - 1] + (c - 1 < 41 ? PITCH_N : PITCH_W);
}
const GRID_WIDTH = colLeft[COLS - 1] + (COLS - 1 < 41 ? 39 : 40);
const GRID_HEIGHT = ROWS * ROW_PITCH;

const mapId = new URLSearchParams(location.search).get('id');
let mapData = null;
let cellData = {};
let dirty = false;
let readonly = false;
let currentUser = null;

let currentTool = 'pan';
let currentColor = 'rgba(255,100,0,0.5)';
let currentIcon = '⚔️';
let selectedKeys = new Set();
let selectionAnchorKey = null;
let undoStack = [];
const MAX_UNDO = 50;

let hoveredKey = null;
let tooltipFrame = 0;
let pendingTooltip = null;
let noteKeys = [];
let dragMoved = false;

const viewport = document.getElementById('viewport');
const coordsBar = document.getElementById('coords-bar');
const tooltip = document.getElementById('tooltip');
const notePopup = document.getElementById('note-popup');
const noteInput = document.getElementById('note-input');

const COLORS = [
  'rgba(255,80,80,0.55)', 'rgba(255,160,0,0.55)',
  'rgba(255,230,0,0.55)', 'rgba(80,200,80,0.55)',
  'rgba(0,180,255,0.55)', 'rgba(130,80,255,0.55)',
  'rgba(255,80,200,0.55)', 'rgba(255,255,255,0.35)',
  'rgba(0,0,0,0.45)', 'rgba(191,176,123,0.55)'
];
const ICONS = ['⚔️','🛡️','💀','⭐','🏠','🔑','💰','🌿','🐉','🚩','❌','✅'];

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[ch]));
}

function cellWidth(ci) {
  return ci < 41 ? 37 : 38;
}

function keyToCoords(key) {
  const [x, y] = key.split(',').map(Number);
  return { x, y };
}

function coordsToIndex(x, y) {
  const ci = x - X_MIN;
  const ri = y - Y_MIN;
  if (ci < 0 || ci >= COLS || ri < 0 || ri >= ROWS) return null;
  return { ci, ri };
}

function isValidKey(key) {
  const { x, y } = keyToCoords(key);
  return !!coordsToIndex(x, y);
}

function cellPixelRect(cell) {
  const left = colLeft[cell.ci];
  const top = cell.ri * ROW_PITCH;
  const right = Math.min(cell.ci === COLS - 1 ? GRID_WIDTH : colLeft[cell.ci + 1], MAP_WIDTH);
  const bottom = Math.min(top + ROW_PITCH, MAP_HEIGHT);
  return { left, top, width: right - left, height: bottom - top };
}

function cellCenter(x, y) {
  const index = coordsToIndex(x, y);
  if (!index) return null;
  return [
    -(index.ri * ROW_PITCH + 10.5),
    colLeft[index.ci] + cellWidth(index.ci) / 2
  ];
}

function pointToCell(latlng) {
  const px = latlng.lng;
  const py = -latlng.lat;
  if (px < 0 || py < 0 || px > MAP_WIDTH || py > MAP_HEIGHT) return null;

  const ri = Math.floor(py / ROW_PITCH);
  if (ri < 0 || ri >= ROWS) return null;

  let lo = 0, hi = COLS - 1;
  while (lo <= hi) {
    const mid = Math.floor((lo + hi) / 2);
    const left = colLeft[mid];
    const right = Math.min(mid === COLS - 1 ? GRID_WIDTH : colLeft[mid + 1], MAP_WIDTH);
    if (px < left) hi = mid - 1;
    else if (px >= right) lo = mid + 1;
    else return { x: X_MIN + mid, y: Y_MIN + ri, ci: mid, ri };
  }
  return null;
}

function makeSvgElement(tag, attrs = {}) {
  const node = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
  return node;
}

const map = L.map('leaflet-map', {
  crs: L.CRS.Simple,
  attributionControl: false,
  zoomControl: false,
  scrollWheelZoom: false,
  zoomSnap: ZOOM_STEP,
  zoomDelta: ZOOM_STEP,
  minZoom: ABSOLUTE_MIN_ZOOM,
  maxZoom: MAX_ZOOM,
  doubleClickZoom: false,
  inertia: false
});

L.imageOverlay('img/map 1.29.jpg', bounds, {
  alt: 'Carte Dofus Retro 1.29',
  interactive: false
}).addTo(map);

const overlayElement = L.DomUtil.create('div', 'map-cell-overlay', map.getPanes().overlayPane);
const overlaySvg = makeSvgElement('svg', {
  viewBox: `0 0 ${MAP_WIDTH} ${MAP_HEIGHT}`,
  preserveAspectRatio: 'none'
});
const colorLayer = makeSvgElement('g');
const iconLayer = makeSvgElement('g');
const hoverRect = makeSvgElement('rect', {
  class: 'map-hover-rect',
  display: 'none',
  fill: '#FFE48A',
  'fill-opacity': '0.42',
  stroke: '#FFF0BF',
  'stroke-width': '2',
  'stroke-opacity': '0.9'
});
const selectionLayer = makeSvgElement('g');
const gridLayer = makeSvgElement('g', {
  stroke: '#D8CBAA',
  'stroke-width': '1.5',
  'stroke-opacity': '0.42',
  fill: 'none'
});

overlaySvg.append(colorLayer, iconLayer, hoverRect, selectionLayer, gridLayer);
overlayElement.appendChild(overlaySvg);

function addGridLine(x1, y1, x2, y2) {
  gridLayer.appendChild(makeSvgElement('line', {
    class: 'map-grid-line',
    x1, y1, x2, y2
  }));
}

function buildGrid() {
  for (let ci = 0; ci < COLS; ci++) {
    const left = colLeft[ci];
    addGridLine(left, 0, left, MAP_HEIGHT);
    if (ci === COLS - 1) addGridLine(Math.min(GRID_WIDTH, MAP_WIDTH), 0, Math.min(GRID_WIDTH, MAP_WIDTH), MAP_HEIGHT);
  }
  for (let ri = 0; ri <= ROWS; ri++) {
    const top = Math.min(ri * ROW_PITCH, GRID_HEIGHT, MAP_HEIGHT);
    addGridLine(0, top, MAP_WIDTH, top);
    if (top >= MAP_HEIGHT) break;
  }
}

function syncOverlay() {
  const nw = map.latLngToLayerPoint(bounds.getNorthWest());
  const se = map.latLngToLayerPoint(bounds.getSouthEast());
  L.DomUtil.setPosition(overlayElement, nw);
  overlayElement.style.width = `${Math.max(0, se.x - nw.x)}px`;
  overlayElement.style.height = `${Math.max(0, se.y - nw.y)}px`;
}

function renderCellByKey(key) {
  const { x, y } = keyToCoords(key);
  const index = coordsToIndex(x, y);
  if (!index) return;

  colorLayer.querySelector(`[data-key="${CSS.escape(key)}"]`)?.remove();
  iconLayer.querySelector(`[data-key="${CSS.escape(key)}"]`)?.remove();

  const data = cellData[key];
  if (!data) return;

  const rect = cellPixelRect(index);
  if (data.color) {
    colorLayer.appendChild(makeSvgElement('rect', {
      class: 'map-cell-rect',
      'data-key': key,
      x: rect.left,
      y: rect.top,
      width: rect.width,
      height: rect.height,
      fill: data.color
    }));
  }

  if (data.icon) {
    const icon = makeSvgElement('text', {
      class: 'map-cell-icon',
      'data-key': key,
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2 + 1
    });
    icon.textContent = data.icon;
    iconLayer.appendChild(icon);
  }
}

function renderAllCells() {
  colorLayer.replaceChildren();
  iconLayer.replaceChildren();
  Object.keys(cellData).forEach(renderCellByKey);
  renderSelection();
}

function applyAllCells() {
  renderAllCells();
}

function updateSelectionStatus() {
  const count = selectedKeys.size;
  document.getElementById('selection-status').textContent = `${count} case${count > 1 ? 's' : ''}`;
}

function renderSelection() {
  selectionLayer.replaceChildren();
  selectedKeys.forEach(key => {
    const { x, y } = keyToCoords(key);
    const index = coordsToIndex(x, y);
    if (!index) return;
    const rect = cellPixelRect(index);
    selectionLayer.appendChild(makeSvgElement('rect', {
      class: 'map-selection-rect',
      x: rect.left,
      y: rect.top,
      width: rect.width,
      height: rect.height,
      fill: '#1f8cff',
      'fill-opacity': '0.22',
      stroke: '#ffffff',
      'stroke-width': '2',
      'stroke-opacity': '0.95'
    }));
  });
  updateSelectionStatus();
}

function pushUndoState() {
  undoStack.push(JSON.parse(JSON.stringify(cellData)));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undoLastChange() {
  if (readonly || undoStack.length === 0) return;
  cellData = undoStack.pop();
  renderAllCells();
  markDirty();
}

function clearSelection() {
  selectedKeys.clear();
  selectionAnchorKey = null;
  renderSelection();
}

function toggleCellSelection(key) {
  if (selectedKeys.has(key)) selectedKeys.delete(key);
  else selectedKeys.add(key);
  selectionAnchorKey = key;
  renderSelection();
}

function selectOneCell(key) {
  selectedKeys = new Set([key]);
  selectionAnchorKey = key;
  renderSelection();
}

function selectRangeTo(key, additive) {
  const anchor = selectionAnchorKey || key;
  const a = keyToCoords(anchor);
  const b = keyToCoords(key);
  if (!additive) selectedKeys.clear();
  for (let y = Math.min(a.y, b.y); y <= Math.max(a.y, b.y); y++) {
    for (let x = Math.min(a.x, b.x); x <= Math.max(a.x, b.x); x++) {
      const nextKey = `${x},${y}`;
      if (isValidKey(nextKey)) selectedKeys.add(nextKey);
    }
  }
  renderSelection();
}

function selectAllCells() {
  selectedKeys.clear();
  for (let y = Y_MIN; y <= Y_MAX; y++) {
    for (let x = X_MIN; x <= X_MAX; x++) selectedKeys.add(`${x},${y}`);
  }
  selectionAnchorKey = `${X_MIN},${Y_MIN}`;
  renderSelection();
}

function handleSelectionClick(key, event) {
  if (event.shiftKey) {
    selectRangeTo(key, event.ctrlKey || event.metaKey);
    return true;
  }
  if (event.ctrlKey || event.metaKey) {
    toggleCellSelection(key);
    return true;
  }
  selectOneCell(key);
  return currentTool === 'pan';
}

function actionKeysFor(targetKey) {
  return selectedKeys.size ? Array.from(selectedKeys) : [targetKey];
}

function applyToolToKeys(tool, keys) {
  const validKeys = keys.filter(isValidKey);
  if (!validKeys.length) return;
  pushUndoState();
  validKeys.forEach(key => {
    if (tool === 'color') {
      cellData[key] = { ...cellData[key], color: currentColor };
    } else if (tool === 'icon') {
      cellData[key] = { ...cellData[key], icon: currentIcon };
    } else if (tool === 'erase') {
      delete cellData[key];
    }
    renderCellByKey(key);
  });
  renderSelection();
  markDirty();
}

function deleteSelectionOrHoveredCell(fallbackKey = null) {
  if (readonly) return;
  const keys = selectedKeys.size ? Array.from(selectedKeys) : (fallbackKey || hoveredKey ? [fallbackKey || hoveredKey] : []);
  if (keys.length) applyToolToKeys('erase', keys);
}

function setTool(tool) {
  if (readonly && tool !== 'pan') tool = 'pan';
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(button => button.classList.remove('active'));
  document.getElementById(`tool-${tool}`)?.classList.add('active');
  viewport.classList.toggle('tool-active', tool !== 'pan');
}
window.setTool = setTool;

function getViewportMinZoom() {
  const size = map.getSize();
  const coverZoom = Math.max(
    Math.log2(size.x / MAP_WIDTH),
    Math.log2(size.y / MAP_HEIGHT)
  );
  return Math.max(ABSOLUTE_MIN_ZOOM, Math.ceil(coverZoom / ZOOM_STEP) * ZOOM_STEP);
}

function updateZoomLabel() {
  document.getElementById('zoom-label').textContent = `${Math.round(Math.pow(2, map.getZoom()) * 100)}%`;
}

function applyZoomLimits() {
  const minZoom = getViewportMinZoom();
  map.setMinZoom(minZoom);
  if (map.getZoom() < minZoom) map.setZoom(minZoom, { animate: false });
  updateZoomLabel();
}

function clampPanToImage() {
  const zoom = map.getZoom();
  const size = map.getSize();
  const half = size.divideBy(2);
  const nw = map.project(bounds.getNorthWest(), zoom);
  const se = map.project(bounds.getSouthEast(), zoom);
  const center = map.project(map.getCenter(), zoom);
  let x = center.x;
  let y = center.y;

  if (se.x - nw.x <= size.x) x = (nw.x + se.x) / 2;
  else x = Math.max(nw.x + half.x, Math.min(se.x - half.x, x));

  if (se.y - nw.y <= size.y) y = (nw.y + se.y) / 2;
  else y = Math.max(nw.y + half.y, Math.min(se.y - half.y, y));

  if (Math.abs(x - center.x) > 0.5 || Math.abs(y - center.y) > 0.5) {
    map.panTo(map.unproject([x, y], zoom), { animate: false });
  }
}

function setZoomAt(point, nextZoom) {
  const zoom = Math.max(map.getMinZoom(), Math.min(MAX_ZOOM, nextZoom));
  if (zoom === map.getZoom()) return;
  map.setZoomAround(point, zoom, { animate: false });
  clampPanToImage();
  updateZoomLabel();
}

function zoomAtCursor(event) {
  event.preventDefault();
  event.stopPropagation();
  const direction = event.deltaY < 0 ? 1 : -1;
  setZoomAt(map.mouseEventToContainerPoint(event), map.getZoom() + direction * ZOOM_STEP);
}

function centerOn(x, y) {
  const center = cellCenter(x, y);
  if (!center) return;
  map.panTo(center, { animate: true });
}

function clearTooltip() {
  tooltip.classList.add('is-hidden');
  tooltip.textContent = '';
  pendingTooltip = null;
}

function moveTooltip(event, text) {
  pendingTooltip = { x: event.clientX + 14, y: event.clientY + 14, text };
  if (tooltipFrame) return;
  tooltipFrame = requestAnimationFrame(() => {
    tooltipFrame = 0;
    if (!pendingTooltip) return;
    tooltip.textContent = pendingTooltip.text;
    tooltip.style.transform = `translate3d(${pendingTooltip.x}px, ${pendingTooltip.y}px, 0)`;
    tooltip.classList.remove('is-hidden');
    pendingTooltip = null;
  });
}

function clearHoverCell() {
  hoveredKey = null;
  hoverRect.setAttribute('display', 'none');
}

function hoverCell(cell) {
  const key = `${cell.x},${cell.y}`;
  if (hoveredKey === key) return;
  hoveredKey = key;
  const rect = cellPixelRect(cell);
  hoverRect.setAttribute('x', rect.left);
  hoverRect.setAttribute('y', rect.top);
  hoverRect.setAttribute('width', rect.width);
  hoverRect.setAttribute('height', rect.height);
  hoverRect.removeAttribute('display');
}

function handlePointerMove(event) {
  const cell = pointToCell(map.mouseEventToLatLng(event));
  if (!cell) {
    coordsBar.textContent = '[-, -]';
    clearHoverCell();
    clearTooltip();
    return;
  }
  hoverCell(cell);
  const key = `${cell.x},${cell.y}`;
  const note = cellData[key]?.note;
  const text = note ? `[${cell.x}, ${cell.y}] - ${note}` : `[${cell.x}, ${cell.y}]`;
  coordsBar.textContent = `[${cell.x}, ${cell.y}]`;
  moveTooltip(event, text);
}

function handlePointerLeave() {
  coordsBar.textContent = '[-, -]';
  clearHoverCell();
  clearTooltip();
}

function openNotePopup(keys, event) {
  noteKeys = keys;
  noteInput.value = keys.length === 1 ? (cellData[keys[0]]?.note || '') : '';
  noteInput.placeholder = keys.length > 1 ? `Note pour ${keys.length} cases...` : 'Votre note...';
  notePopup.style.display = 'block';
  notePopup.style.left = `${Math.min(event.clientX + 10, window.innerWidth - 220)}px`;
  notePopup.style.top = `${Math.min(event.clientY + 10, window.innerHeight - 130)}px`;
  setTimeout(() => noteInput.focus(), 50);
}

function markDirty() {
  if (readonly) return;
  dirty = true;
  document.getElementById('save-status').textContent = 'Modifications non sauvegardées';
  document.getElementById('save-status').style.color = '#ff9944';
}

async function saveMap() {
  if (readonly) return;
  const button = document.getElementById('btn-save');
  button.disabled = true;
  const name = document.getElementById('map-title-input').value.trim() || 'Sans titre';
  const isPublic = document.getElementById('map-public-toggle').checked;
  const result = await window.DofusApi.updateMap(mapId, { name, cells: cellData, isPublic })
    .then(() => ({ ok: true }))
    .catch(() => ({ ok: false }));
  button.disabled = false;
  if (result.ok) {
    dirty = false;
    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('save-status').textContent = `Sauvegardé à ${now}`;
    document.getElementById('save-status').style.color = '#88cc88';
  }
}

function applyReadonlyMode() {
  readonly = !!mapData.readonly;
  document.body.classList.toggle('readonly', readonly);
  document.getElementById('btn-save').disabled = readonly;
  document.getElementById('visibility-control').style.display = readonly ? 'none' : 'flex';
  document.getElementById('map-title-input').readOnly = readonly;
  if (readonly) {
    setTool('pan');
    document.getElementById('save-status').textContent = 'Lecture seule';
    document.getElementById('save-status').style.color = '#D4C48A';
  }
}

function initPalette() {
  const colorGrid = document.getElementById('color-grid');
  COLORS.forEach((color, index) => {
    const swatch = document.createElement('div');
    swatch.className = `color-swatch${index === 0 ? ' active' : ''}`;
    swatch.style.backgroundColor = color;
    swatch.dataset.color = color;
    swatch.title = color;
    swatch.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(item => item.classList.remove('active'));
      swatch.classList.add('active');
      currentColor = color;
      setTool('color');
      if (selectedKeys.size) applyToolToKeys('color', Array.from(selectedKeys));
    });
    colorGrid.appendChild(swatch);
  });
  currentColor = COLORS[0];

  document.getElementById('custom-color').addEventListener('input', event => {
    const hex = event.target.value;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    currentColor = `rgba(${r},${g},${b},0.55)`;
    document.querySelectorAll('.color-swatch').forEach(item => item.classList.remove('active'));
    setTool('color');
    if (selectedKeys.size) applyToolToKeys('color', Array.from(selectedKeys));
  });

  const iconGrid = document.getElementById('icon-grid');
  ICONS.forEach((icon, index) => {
    const button = document.createElement('button');
    button.className = `icon-btn${index === 0 ? ' active' : ''}`;
    button.textContent = icon;
    button.title = icon;
    button.addEventListener('click', () => {
      document.querySelectorAll('.icon-btn').forEach(item => item.classList.remove('active'));
      button.classList.add('active');
      currentIcon = icon;
      setTool('icon');
      if (selectedKeys.size) applyToolToKeys('icon', Array.from(selectedKeys));
    });
    iconGrid.appendChild(button);
  });
}

function initEvents() {
  map.getContainer().addEventListener('wheel', zoomAtCursor, { passive: false });
  map.getContainer().addEventListener('pointermove', handlePointerMove, { passive: true });
  map.getContainer().addEventListener('pointerleave', handlePointerLeave);

  map.on('dragstart', () => { dragMoved = false; });
  map.on('drag', () => { dragMoved = true; });
  map.on('drag dragend zoomend', () => {
    clampPanToImage();
    updateZoomLabel();
  });
  map.on('resize', () => {
    applyZoomLimits();
    clampPanToImage();
    syncOverlay();
  });
  map.on('move zoom viewreset', syncOverlay);

  map.on('click', event => {
    if (dragMoved) {
      dragMoved = false;
      return;
    }
    if (readonly) return;
    const cell = pointToCell(event.latlng);
    if (!cell) return;
    const key = `${cell.x},${cell.y}`;
    if (handleSelectionClick(key, event.originalEvent)) return;
    const keys = actionKeysFor(key);
    if (currentTool === 'color') applyToolToKeys('color', keys);
    else if (currentTool === 'icon') applyToolToKeys('icon', keys);
    else if (currentTool === 'note') openNotePopup(keys, event.originalEvent);
    else if (currentTool === 'erase') applyToolToKeys('erase', keys);
  });

  map.on('contextmenu', event => {
    event.originalEvent.preventDefault();
    if (readonly) return;
    const cell = pointToCell(event.latlng);
    if (!cell) return;
    clearSelection();
    deleteSelectionOrHoveredCell(`${cell.x},${cell.y}`);
  });

  document.getElementById('zoom-in').addEventListener('click', () => setZoomAt(map.getSize().divideBy(2), map.getZoom() + ZOOM_STEP));
  document.getElementById('zoom-out').addEventListener('click', () => setZoomAt(map.getSize().divideBy(2), map.getZoom() - ZOOM_STEP));
  document.getElementById('zoom-reset').addEventListener('click', () => {
    map.setView(cellCenter(0, 0), Math.max(0, map.getMinZoom()), { animate: false });
    clampPanToImage();
    updateZoomLabel();
  });

  document.getElementById('btn-note-ok').addEventListener('click', () => {
    const value = noteInput.value.trim();
    if (noteKeys.length) {
      pushUndoState();
      noteKeys.forEach(key => {
        if (value) cellData[key] = { ...cellData[key], note: value };
        else if (cellData[key]) delete cellData[key].note;
        renderCellByKey(key);
      });
      renderSelection();
      markDirty();
    }
    notePopup.style.display = 'none';
    noteKeys = [];
  });
  document.getElementById('btn-note-cancel').addEventListener('click', () => {
    notePopup.style.display = 'none';
    noteKeys = [];
  });
  noteInput.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      document.getElementById('btn-note-ok').click();
    }
    if (event.key === 'Escape') document.getElementById('btn-note-cancel').click();
  });

  document.getElementById('btn-save').addEventListener('click', saveMap);
  document.getElementById('map-title-input').addEventListener('input', markDirty);
  document.getElementById('map-public-toggle').addEventListener('change', markDirty);

  document.addEventListener('keydown', event => {
    const tag = event.target?.tagName?.toLowerCase();
    const isTyping = tag === 'input' || tag === 'textarea';
    if (!isTyping && (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
      event.preventDefault();
      undoLastChange();
      return;
    }
    if ((event.ctrlKey || event.metaKey) && event.key === 's') {
      event.preventDefault();
      saveMap();
      return;
    }
    if (!isTyping && (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'a') {
      event.preventDefault();
      selectAllCells();
      return;
    }
    if (!isTyping && (event.key === 'Delete' || event.key === 'Del')) {
      event.preventDefault();
      deleteSelectionOrHoveredCell();
      return;
    }
    if (!isTyping && event.key === 'Escape') clearSelection();
  });

  window.addEventListener('beforeunload', event => {
    if (dirty) {
      event.preventDefault();
      event.returnValue = '';
    }
  });
}

async function loadMap() {
  if (!mapId) {
    window.location.href = 'maps.html';
    return;
  }

  currentUser = await window.DofusApi.currentUser();
  mapData = await window.DofusApi.getMap(mapId).catch(() => null);
  if (!mapData) {
    window.location.href = currentUser ? 'maps.html' : 'community.html';
    return;
  }

  cellData = mapData.cells || {};
  document.getElementById('map-title-input').value = mapData.name;
  document.getElementById('map-public-toggle').checked = !!mapData.isPublic;
  document.title = `${mapData.name} - Dofus Retro`;
  document.querySelector('.back-link').href = mapData.readonly ? 'community.html' : 'maps.html';
  document.querySelector('.back-link').textContent = mapData.readonly ? '← Communauté' : '← Mes cartes';
  applyReadonlyMode();
  applyAllCells();
  centerOn(0, 0);

  if (!readonly) {
    document.getElementById('save-status').textContent = 'A jour';
    document.getElementById('save-status').style.color = '#88cc88';
  }
}

initPalette();
buildGrid();
map.setView(cellCenter(0, 0), 0, { animate: false });
applyZoomLimits();
syncOverlay();
clampPanToImage();
updateZoomLabel();
initEvents();
loadMap();
})();
</script>
</body>
</html>
