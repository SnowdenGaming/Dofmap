<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dofus Retro - Test Leaflet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIINfQHVaf6b7qC8hAABPHgW9Qf+htG0d98=" crossorigin="">
<style>
  * { box-sizing: border-box; }
  html, body, #leaflet-map {
    width: 100%;
    height: 100%;
    margin: 0;
  }
  body {
    overflow: hidden;
    background: #111;
    font-family: "Gill Sans", Arial, sans-serif;
    color: #D4C48A;
  }
  #leaflet-map {
    background: #111;
  }
  .leaflet-container {
    font: inherit;
    cursor: grab;
  }
  .leaflet-container.leaflet-dragging {
    cursor: grabbing;
  }
  .leaflet-control-attribution {
    display: none;
  }
  .leaflet-control-zoom {
    border: 1px solid rgba(191, 176, 123, 0.38);
    box-shadow: none;
  }
  .leaflet-control-zoom a {
    background: rgba(42, 37, 21, 0.94);
    color: #D4C48A;
    border-color: rgba(191, 176, 123, 0.28);
  }
  .leaflet-control-zoom a:hover {
    background: rgba(88, 83, 58, 0.96);
    color: #D4C48A;
  }
  .leaflet-image-layer {
    image-rendering: auto;
  }
  .leaflet-grid-line {
    vector-effect: non-scaling-stroke;
  }
  .leaflet-grid-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 2;
  }
  .leaflet-grid-overlay svg {
    display: block;
    width: 100%;
    height: 100%;
  }
  .topbar {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    right: 0;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 12px;
    background: rgba(42, 37, 21, 0.94);
    border-bottom: 1px solid rgba(191, 176, 123, 0.28);
  }
  .topbar-left,
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .link,
  .btn {
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    border: 1px solid rgba(191, 176, 123, 0.38);
    border-radius: 4px;
    background: rgba(88, 83, 58, 0.8);
    color: #D4C48A;
    font-family: Cinzel, Georgia, serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover,
  .link:hover {
    background: rgba(110, 104, 73, 0.95);
  }
  .title {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: Cinzel, Georgia, serif;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .coords {
    position: fixed;
    z-index: 1000;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    max-width: calc(100vw - 24px);
    padding: 6px 12px;
    border-radius: 4px;
    background: rgba(42, 37, 21, 0.92);
    border: 1px solid rgba(191, 176, 123, 0.32);
    color: #D4C48A;
    font: 13px Consolas, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cursor-tooltip {
    position: fixed;
    z-index: 1400;
    left: 0;
    top: 0;
    padding: 5px 8px;
    border: 1px solid rgba(245, 229, 184, 0.35);
    border-radius: 4px;
    background: rgba(28, 23, 13, 0.86);
    color: #F5E5B8;
    box-shadow: none;
    font: 12px Consolas, monospace;
    pointer-events: none;
    transform: translate3d(-9999px, -9999px, 0);
    will-change: transform;
  }
  .cursor-tooltip.is-hidden {
    opacity: 0;
  }
  @media (max-width: 720px) {
    .topbar {
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .topbar-left,
    .topbar-right {
      width: 100%;
      justify-content: space-between;
    }
    .title {
      max-width: 54vw;
    }
    .coords {
      bottom: 8px;
    }
  }
</style>
</head>
<body>
<div id="leaflet-map"></div>

<div class="topbar">
  <div class="topbar-left">
    <a class="link" href="maps.html">Retour</a>
    <span class="title">Test Leaflet - grille Dofus Retro</span>
  </div>
  <div class="topbar-right">
    <button class="btn" id="home-btn" type="button">[0, 0]</button>
  </div>
</div>

<div class="coords" id="coords">Survolez une case</div>
<div class="cursor-tooltip is-hidden" id="cursor-tooltip"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  const X_MIN = -91, X_MAX = 43;
  const Y_MIN = -120, Y_MAX = 48;
  const COLS = X_MAX - X_MIN + 1;
  const ROWS = Y_MAX - Y_MIN + 1;
  const PITCH_N = 39, PITCH_W = 40, ROW_PITCH = 23;
  const IMAGE_WIDTH = 5359;
  const IMAGE_HEIGHT = 3869;

  const colLeft = [0];
  for (let c = 1; c < COLS; c++) {
    colLeft[c] = colLeft[c - 1] + (c - 1 < 41 ? PITCH_N : PITCH_W);
  }

  const GRID_WIDTH = colLeft[COLS - 1] + (COLS - 1 < 41 ? 39 : 40);
  const GRID_HEIGHT = ROWS * ROW_PITCH;
  const MAP_WIDTH = IMAGE_WIDTH;
  const MAP_HEIGHT = IMAGE_HEIGHT;
  const ZOOM_STEP = 0.25;
  const ABSOLUTE_MIN_ZOOM = -2;
  const MAX_ZOOM = 3;
  const bounds = L.latLngBounds([[-MAP_HEIGHT, 0], [0, MAP_WIDTH]]);

  const coords = document.getElementById('coords');
  const cursorTooltip = document.getElementById('cursor-tooltip');
  let selectedKey = null;
  let hoveredKey = null;
  let hoverRect = null;
  let tooltipFrame = 0;
  let pendingTooltip = null;

  function cellWidth(ci) {
    return ci < 41 ? 37 : 38;
  }

  function cellBounds(x, y) {
    const ci = x - X_MIN;
    const ri = y - Y_MIN;
    const left = colLeft[ci];
    const top = ri * ROW_PITCH;
    const right = Math.min(ci === COLS - 1 ? GRID_WIDTH : colLeft[ci + 1], MAP_WIDTH);
    const bottom = Math.min(top + ROW_PITCH, MAP_HEIGHT);
    return [[-bottom, left], [-top, right]];
  }

  function cellCenterByIndex(ci, ri) {
    return [
      -(ri * ROW_PITCH + 10.5),
      colLeft[ci] + cellWidth(ci) / 2
    ];
  }

  function cellCenter(x, y) {
    return cellCenterByIndex(x - X_MIN, y - Y_MIN);
  }

  function cellPixelRect(cell) {
    const left = colLeft[cell.ci];
    const top = cell.ri * ROW_PITCH;
    const right = Math.min(cell.ci === COLS - 1 ? GRID_WIDTH : colLeft[cell.ci + 1], MAP_WIDTH);
    const bottom = Math.min(top + ROW_PITCH, MAP_HEIGHT);
    return { left, top, width: right - left, height: bottom - top };
  }

  function pointToCell(latlng) {
    const px = latlng.lng;
    const py = -latlng.lat;
    if (px < 0 || py < 0 || px > MAP_WIDTH || py > MAP_HEIGHT) return null;

    const ri = Math.floor(py / ROW_PITCH);
    if (ri < 0 || ri >= ROWS) return null;

    let lo = 0, hi = COLS - 1;
    while (lo <= hi) {
      const mid = Math.floor((lo + hi) / 2);
      const left = colLeft[mid];
      const right = Math.min(mid === COLS - 1 ? GRID_WIDTH : colLeft[mid + 1], MAP_WIDTH);
      if (px < left) hi = mid - 1;
      else if (px >= right) lo = mid + 1;
      else return { x: X_MIN + mid, y: Y_MIN + ri, ci: mid, ri };
    }
    return null;
  }

  const map = L.map('leaflet-map', {
    crs: L.CRS.Simple,
    zoomControl: false,
    attributionControl: false,
    scrollWheelZoom: false,
    zoomSnap: ZOOM_STEP,
    zoomDelta: ZOOM_STEP,
    minZoom: ABSOLUTE_MIN_ZOOM,
    maxZoom: MAX_ZOOM,
    doubleClickZoom: false,
    inertia: false
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  map.createPane('selectionPane');
  map.getPane('selectionPane').style.zIndex = 610;
  map.getPane('selectionPane').style.pointerEvents = 'none';

  L.imageOverlay('img/map 1.29.jpg', bounds, {
    alt: 'Carte Dofus Retro 1.29',
    interactive: false
  }).addTo(map);

  const selectionLayer = L.layerGroup().addTo(map);

  function addGridLine(lines, x1, y1, x2, y2) {
    lines.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`);
  }

  const gridElement = L.DomUtil.create('div', 'leaflet-grid-overlay', map.getPanes().overlayPane);
  gridElement.style.zIndex = 2;

  function buildGridSvg() {
    const lines = [];
    for (let ci = 0; ci < COLS; ci++) {
      const left = colLeft[ci];
      addGridLine(lines, left, 0, left, MAP_HEIGHT);
      if (ci === COLS - 1) {
        const right = Math.min(GRID_WIDTH, MAP_WIDTH);
        addGridLine(lines, right, 0, right, MAP_HEIGHT);
      }
    }

    for (let ri = 0; ri <= ROWS; ri++) {
      const top = Math.min(ri * ROW_PITCH, GRID_HEIGHT, MAP_HEIGHT);
      addGridLine(lines, 0, top, MAP_WIDTH, top);
      if (top >= MAP_HEIGHT) break;
    }

    const hover = '<rect id="hover-cell" display="none" fill="#FFE48A" fill-opacity="0.56" stroke="#FFF0BF" stroke-width="2" stroke-opacity="0.95" vector-effect="non-scaling-stroke"/>';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${MAP_WIDTH} ${MAP_HEIGHT}" preserveAspectRatio="none">${hover}<g stroke="#D8CBAA" stroke-width="1.5" stroke-opacity="0.42" vector-effect="non-scaling-stroke">${lines.join('')}</g></svg>`;
    return svg;
  }

  function syncGridOverlay() {
    const nw = map.latLngToLayerPoint(bounds.getNorthWest());
    const se = map.latLngToLayerPoint(bounds.getSouthEast());
    L.DomUtil.setPosition(gridElement, nw);
    gridElement.style.width = `${Math.max(0, se.x - nw.x)}px`;
    gridElement.style.height = `${Math.max(0, se.y - nw.y)}px`;
  }

  function selectCell(cell) {
    selectedKey = `${cell.x},${cell.y}`;
    selectionLayer.clearLayers();
    L.rectangle(cellBounds(cell.x, cell.y), {
      pane: 'selectionPane',
      interactive: false,
      color: '#ffffff',
      weight: 2,
      fillColor: '#1f8cff',
      fillOpacity: 0.28
    }).addTo(selectionLayer);
    coords.textContent = `Selection [${cell.x}, ${cell.y}]`;
  }

  function centerOn(x, y) {
    const ci = x - X_MIN;
    const ri = y - Y_MIN;
    if (ci < 0 || ci >= COLS || ri < 0 || ri >= ROWS) return;
    map.panTo(cellCenter(x, y), { animate: true });
  }

  function getViewportMinZoom() {
    const size = map.getSize();
    const coverZoom = Math.max(
      Math.log2(size.x / MAP_WIDTH),
      Math.log2(size.y / MAP_HEIGHT)
    );
    return Math.max(ABSOLUTE_MIN_ZOOM, Math.ceil(coverZoom / ZOOM_STEP) * ZOOM_STEP);
  }

  function applyZoomLimits() {
    const minZoom = getViewportMinZoom();
    map.setMinZoom(minZoom);
    if (map.getZoom() < minZoom) {
      map.setZoom(minZoom, { animate: false });
    }
  }

  function clampPanToImage() {
    const zoom = map.getZoom();
    const size = map.getSize();
    const half = size.divideBy(2);
    const nw = map.project(bounds.getNorthWest(), zoom);
    const se = map.project(bounds.getSouthEast(), zoom);
    const center = map.project(map.getCenter(), zoom);
    let x = center.x;
    let y = center.y;

    if (se.x - nw.x <= size.x) x = (nw.x + se.x) / 2;
    else x = Math.max(nw.x + half.x, Math.min(se.x - half.x, x));

    if (se.y - nw.y <= size.y) y = (nw.y + se.y) / 2;
    else y = Math.max(nw.y + half.y, Math.min(se.y - half.y, y));

    if (Math.abs(x - center.x) > 0.5 || Math.abs(y - center.y) > 0.5) {
      map.panTo(map.unproject([x, y], zoom), { animate: false });
    }
  }

  function zoomAtCursor(event) {
    event.preventDefault();
    event.stopPropagation();
    const direction = event.deltaY < 0 ? 1 : -1;
    const nextZoom = Math.max(map.getMinZoom(), Math.min(MAX_ZOOM, map.getZoom() + direction * ZOOM_STEP));
    if (nextZoom === map.getZoom()) return;
    map.setZoomAround(map.mouseEventToContainerPoint(event), nextZoom, { animate: false });
    clampPanToImage();
  }

  function clearCursorTooltip() {
    cursorTooltip.classList.add('is-hidden');
    cursorTooltip.textContent = '';
    pendingTooltip = null;
  }

  function moveCursorTooltip(event, text) {
    pendingTooltip = { x: event.clientX + 14, y: event.clientY + 14, text };
    if (tooltipFrame) return;
    tooltipFrame = requestAnimationFrame(() => {
      tooltipFrame = 0;
      if (!pendingTooltip) return;
      cursorTooltip.textContent = pendingTooltip.text;
      cursorTooltip.style.transform = `translate3d(${pendingTooltip.x}px, ${pendingTooltip.y}px, 0)`;
      cursorTooltip.classList.remove('is-hidden');
      pendingTooltip = null;
    });
  }

  function clearHoverCell() {
    hoveredKey = null;
    if (hoverRect) hoverRect.setAttribute('display', 'none');
  }

  function hoverCell(cell) {
    const key = `${cell.x},${cell.y}`;
    if (hoveredKey === key) return;
    hoveredKey = key;
    if (!hoverRect) return;
    const rect = cellPixelRect(cell);
    hoverRect.setAttribute('x', rect.left);
    hoverRect.setAttribute('y', rect.top);
    hoverRect.setAttribute('width', rect.width);
    hoverRect.setAttribute('height', rect.height);
    hoverRect.removeAttribute('display');
  }

  map.setView(cellCenter(0, 0), 0, { animate: false });
  gridElement.innerHTML = buildGridSvg();
  hoverRect = gridElement.querySelector('#hover-cell');
  applyZoomLimits();
  syncGridOverlay();
  clampPanToImage();

  map.getContainer().addEventListener('wheel', zoomAtCursor, { passive: false });
  map.on('drag dragend zoomend', clampPanToImage);
  map.on('resize', () => {
    applyZoomLimits();
    clampPanToImage();
    syncGridOverlay();
  });
  map.on('move zoom viewreset', syncGridOverlay);

  function handlePointerMove(event) {
    const cell = pointToCell(map.mouseEventToLatLng(event));
    if (!cell) {
      coords.textContent = selectedKey ? `Selection [${selectedKey}]` : 'Survolez une case';
      clearHoverCell();
      clearCursorTooltip();
      return;
    }
    hoverCell(cell);
    const text = `[${cell.x}, ${cell.y}]`;
    coords.textContent = text;
    moveCursorTooltip(event, text);
  }

  function handlePointerLeave() {
    clearHoverCell();
    clearCursorTooltip();
    coords.textContent = selectedKey ? `Selection [${selectedKey}]` : 'Survolez une case';
  }

  map.getContainer().addEventListener('pointermove', handlePointerMove, { passive: true });
  map.getContainer().addEventListener('pointerleave', handlePointerLeave);

  map.on('click', e => {
    const cell = pointToCell(e.latlng);
    if (cell) selectCell(cell);
  });

  document.getElementById('home-btn').addEventListener('click', () => centerOn(0, 0));
})();
</script>
</body>
</html>
