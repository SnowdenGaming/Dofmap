<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dofus Retro - Test Leaflet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIINfQHVaf6b7qC8hAABPHgW9Qf+htG0d98=" crossorigin="">
<style>
  * { box-sizing: border-box; }
  html, body, #leaflet-map {
    width: 100%;
    height: 100%;
    margin: 0;
  }
  body {
    overflow: hidden;
    background: #111;
    font-family: "Gill Sans", Arial, sans-serif;
    color: #D4C48A;
  }
  #leaflet-map {
    background: #111;
  }
  .leaflet-container {
    font: inherit;
    cursor: grab;
  }
  .leaflet-container.leaflet-dragging {
    cursor: grabbing;
  }
  .leaflet-control-attribution {
    display: none;
  }
  .leaflet-image-layer {
    image-rendering: auto;
  }
  .topbar {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    right: 0;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 12px;
    background: rgba(42, 37, 21, 0.94);
    border-bottom: 1px solid rgba(191, 176, 123, 0.28);
  }
  .topbar-left,
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .link,
  .btn {
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    border: 1px solid rgba(191, 176, 123, 0.38);
    border-radius: 4px;
    background: rgba(88, 83, 58, 0.8);
    color: #D4C48A;
    font-family: Cinzel, Georgia, serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover,
  .link:hover {
    background: rgba(110, 104, 73, 0.95);
  }
  .title {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: Cinzel, Georgia, serif;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .coords {
    position: fixed;
    z-index: 1000;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    max-width: calc(100vw - 24px);
    padding: 6px 12px;
    border-radius: 4px;
    background: rgba(42, 37, 21, 0.92);
    border: 1px solid rgba(191, 176, 123, 0.32);
    color: #D4C48A;
    font: 13px Consolas, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search {
    position: fixed;
    z-index: 1000;
    left: 12px;
    bottom: 12px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px;
    border-radius: 4px;
    background: rgba(42, 37, 21, 0.92);
    border: 1px solid rgba(191, 176, 123, 0.32);
  }
  .search label {
    font: 12px Consolas, monospace;
    color: #BFB07B;
  }
  .search input {
    width: 54px;
    height: 26px;
    border: 1px solid #8A7A50;
    border-radius: 3px;
    background: #D9C9AE;
    color: #2A2515;
    text-align: center;
  }
  .leaflet-tooltip.cell-tooltip {
    padding: 4px 8px;
    border: 0;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.78);
    color: #fff;
    box-shadow: none;
    font: 12px Consolas, monospace;
  }
  @media (max-width: 720px) {
    .topbar {
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .topbar-left,
    .topbar-right {
      width: 100%;
      justify-content: space-between;
    }
    .title {
      max-width: 54vw;
    }
    .search {
      left: 8px;
      right: 8px;
      bottom: 50px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .coords {
      bottom: 8px;
    }
  }
</style>
</head>
<body>
<div id="leaflet-map"></div>

<div class="topbar">
  <div class="topbar-left">
    <a class="link" href="maps.html">Retour</a>
    <span class="title">Test Leaflet - grille Dofus Retro</span>
  </div>
  <div class="topbar-right">
    <button class="btn" id="toggle-grid" type="button">Grille</button>
    <button class="btn" id="home-btn" type="button">[0, 0]</button>
  </div>
</div>

<div class="search">
  <label for="sx">X</label>
  <input id="sx" type="number" value="0" min="-91" max="43">
  <label for="sy">Y</label>
  <input id="sy" type="number" value="0" min="-120" max="48">
  <button class="btn" id="go-btn" type="button">Aller</button>
</div>

<div class="coords" id="coords">Survolez une case</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  const X_MIN = -91, X_MAX = 43;
  const Y_MIN = -120, Y_MAX = 48;
  const COLS = X_MAX - X_MIN + 1;
  const ROWS = Y_MAX - Y_MIN + 1;
  const PITCH_N = 39, PITCH_W = 40, ROW_PITCH = 23;

  const colLeft = [0];
  for (let c = 1; c < COLS; c++) {
    colLeft[c] = colLeft[c - 1] + (c - 1 < 41 ? PITCH_N : PITCH_W);
  }

  const MAP_WIDTH = colLeft[COLS - 1] + (COLS - 1 < 41 ? 37 : 38);
  const MAP_HEIGHT = (ROWS - 1) * ROW_PITCH + 21;
  const bounds = [[0, 0], [MAP_HEIGHT, MAP_WIDTH]];

  const coords = document.getElementById('coords');
  let gridVisible = true;
  let selectedKey = null;

  function cellWidth(ci) {
    return ci < 41 ? 37 : 38;
  }

  function cellBounds(x, y) {
    const ci = x - X_MIN;
    const ri = y - Y_MIN;
    const left = colLeft[ci];
    const top = ri * ROW_PITCH;
    return [[top, left], [top + 21, left + cellWidth(ci)]];
  }

  function cellCenter(x, y) {
    const [[top, left], [bottom, right]] = cellBounds(x, y);
    return [(top + bottom) / 2, (left + right) / 2];
  }

  function pointToCell(latlng) {
    const px = latlng.lng;
    const py = latlng.lat;
    if (px < 0 || py < 0 || px > MAP_WIDTH || py > MAP_HEIGHT) return null;

    const ri = Math.floor(py / ROW_PITCH);
    if (ri < 0 || ri >= ROWS) return null;

    let lo = 0, hi = COLS - 1;
    while (lo <= hi) {
      const mid = Math.floor((lo + hi) / 2);
      const left = colLeft[mid];
      const right = left + cellWidth(mid);
      if (px < left) hi = mid - 1;
      else if (px >= right) lo = mid + 1;
      else return { x: X_MIN + mid, y: Y_MIN + ri, ci: mid, ri };
    }
    return null;
  }

  const map = L.map('leaflet-map', {
    crs: L.CRS.Simple,
    zoomControl: true,
    attributionControl: false,
    minZoom: -2,
    maxZoom: 3,
    maxBounds: bounds,
    maxBoundsViscosity: 1,
    wheelPxPerZoomLevel: 90
  });

  L.imageOverlay('img/map 1.29.jpg', bounds, {
    alt: 'Carte Dofus Retro 1.29',
    interactive: false
  }).addTo(map);

  const gridLayer = L.canvas({ padding: 0.4 });
  const selectionLayer = L.layerGroup().addTo(map);
  const hoverTooltip = L.tooltip({
    permanent: false,
    direction: 'top',
    className: 'cell-tooltip',
    offset: [0, -6]
  });

  gridLayer.on('add', () => drawGrid());
  gridLayer.on('remove', () => {});
  gridLayer.addTo(map);

  function drawGrid() {
    const canvas = gridLayer._container;
    if (!canvas || !gridVisible) return;
    const ctx = canvas.getContext('2d');
    const size = map.getSize();
    ctx.clearRect(0, 0, size.x, size.y);
    ctx.save();
    ctx.strokeStyle = 'rgba(184, 177, 143, 0.75)';
    ctx.lineWidth = 1;

    for (let ci = 0; ci < COLS; ci++) {
      const left = colLeft[ci];
      const right = left + cellWidth(ci);
      const p1 = map.latLngToContainerPoint([0, left]);
      const p2 = map.latLngToContainerPoint([MAP_HEIGHT, left]);
      const p3 = map.latLngToContainerPoint([0, right]);
      ctx.beginPath();
      ctx.moveTo(Math.round(p1.x) + 0.5, p1.y);
      ctx.lineTo(Math.round(p2.x) + 0.5, p2.y);
      ctx.stroke();
      if (ci === COLS - 1) {
        ctx.beginPath();
        ctx.moveTo(Math.round(p3.x) + 0.5, p3.y);
        ctx.lineTo(Math.round(p3.x) + 0.5, p2.y);
        ctx.stroke();
      }
    }

    for (let ri = 0; ri <= ROWS; ri++) {
      const top = Math.min(ri * ROW_PITCH, MAP_HEIGHT);
      const p1 = map.latLngToContainerPoint([top, 0]);
      const p2 = map.latLngToContainerPoint([top, MAP_WIDTH]);
      ctx.beginPath();
      ctx.moveTo(p1.x, Math.round(p1.y) + 0.5);
      ctx.lineTo(p2.x, Math.round(p2.y) + 0.5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function refreshGrid() {
    const canvas = gridLayer._container;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const size = map.getSize();
    ctx.clearRect(0, 0, size.x, size.y);
    drawGrid();
  }

  function selectCell(cell) {
    selectedKey = `${cell.x},${cell.y}`;
    selectionLayer.clearLayers();
    L.rectangle(cellBounds(cell.x, cell.y), {
      interactive: false,
      color: '#ffffff',
      weight: 2,
      fillColor: '#1f8cff',
      fillOpacity: 0.28
    }).addTo(selectionLayer);
    coords.textContent = `Selection [${cell.x}, ${cell.y}]`;
  }

  function centerOn(x, y) {
    const ci = x - X_MIN;
    const ri = y - Y_MIN;
    if (ci < 0 || ci >= COLS || ri < 0 || ri >= ROWS) return;
    map.panTo(cellCenter(x, y), { animate: true });
  }

  map.fitBounds(bounds);
  map.setMaxBounds(bounds);
  map.on('move zoom resize', refreshGrid);

  map.on('mousemove', e => {
    const cell = pointToCell(e.latlng);
    if (!cell) {
      coords.textContent = selectedKey ? `Selection [${selectedKey}]` : 'Survolez une case';
      map.closeTooltip(hoverTooltip);
      return;
    }
    const text = `[${cell.x}, ${cell.y}]`;
    coords.textContent = text;
    hoverTooltip.setContent(text).setLatLng(e.latlng);
    if (!map.hasLayer(hoverTooltip)) hoverTooltip.addTo(map);
  });

  map.on('mouseout', () => {
    map.closeTooltip(hoverTooltip);
    coords.textContent = selectedKey ? `Selection [${selectedKey}]` : 'Survolez une case';
  });

  map.on('click', e => {
    const cell = pointToCell(e.latlng);
    if (cell) selectCell(cell);
  });

  document.getElementById('home-btn').addEventListener('click', () => centerOn(0, 0));
  document.getElementById('go-btn').addEventListener('click', () => {
    const x = parseInt(document.getElementById('sx').value, 10);
    const y = parseInt(document.getElementById('sy').value, 10);
    if (!Number.isNaN(x) && !Number.isNaN(y)) centerOn(x, y);
  });
  document.getElementById('toggle-grid').addEventListener('click', () => {
    gridVisible = !gridVisible;
    refreshGrid();
  });
  ['sx', 'sy'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('go-btn').click();
    });
  });
})();
</script>
</body>
</html>
