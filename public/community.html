<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dofus Retro - Communauté</title>
<link rel="stylesheet" href="css/theme.css">
</head>
<body class="app-page">
<header class="topbar">
  <div class="app-shell app-topbar-inner">
    <a class="app-brand" href="index.html">
      <span>Dofus Retro</span>
    </a>
    <nav class="app-nav" aria-label="Navigation principale">
      <a class="app-nav-link" href="index.html">Accueil</a>
      <a class="app-nav-link" href="maps.html">Mes cartes</a>
      <a class="app-nav-link is-active" href="community.html">Communauté</a>
    </nav>
    <div class="app-topbar-actions" id="auth-area"></div>
  </div>
</header>

<main class="app-main">
  <section class="app-shell app-page-heading">
    <div>
      <span class="app-eyebrow">Cartes publiques</span>
      <h1 class="app-title">Communauté</h1>
      <p class="app-subtitle">Explorez les cartes partagées par les aventuriers et ouvrez celles qui vous aident à préparer votre route.</p>
    </div>
    <div class="app-heading-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Activer le mode nuit">☀</button>
      <a class="app-button primary" href="maps.html">Mes cartes</a>
    </div>
  </section>

  <section class="app-shell app-toolbar">
    <label class="app-search" for="map-search">
      <span aria-hidden="true">⌕</span>
      <input id="map-search" type="search" placeholder="Rechercher par carte ou aventurier">
    </label>
    <span class="app-toolbar-note" id="maps-count"></span>
  </section>

  <section class="app-shell app-grid" id="maps-grid">
    <div class="app-empty">
      <div>
        <strong>Chargement des cartes</strong>
        <p>Les cartes publiques arrivent.</p>
      </div>
    </div>
  </section>
</main>

<footer>Dofus Retro 1.29 · Monde des Douze · Fan Site</footer>

<script src="js/theme-toggle.js" defer></script>
<script type="module">
import './js/supabase-api.js';

let allMaps = [];

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function annotationCount(map) {
  return map.annotationCount ?? Object.keys(map.cells || {}).length;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[ch]));
}

function openMap(id) {
  window.location.href = `map-editor.html?id=${id}`;
}

function filteredMaps() {
  const query = document.getElementById('map-search').value.trim().toLowerCase();
  if (!query) return allMaps;
  return allMaps.filter(map => {
    const name = String(map.name || '').toLowerCase();
    const username = String(map.username || '').toLowerCase();
    return name.includes(query) || username.includes(query);
  });
}

function renderMaps(maps) {
  const grid = document.getElementById('maps-grid');
  const count = document.getElementById('maps-count');
  grid.innerHTML = '';
  count.textContent = `${maps.length} carte${maps.length !== 1 ? 's' : ''} publique${maps.length !== 1 ? 's' : ''}`;

  if (maps.length === 0) {
    grid.innerHTML = `<div class="app-empty">
      <div>
        <strong>Aucune carte publique</strong>
        <p>Revenez plus tard ou publiez une carte depuis votre espace.</p>
      </div>
    </div>`;
    return;
  }

  maps.forEach(map => {
    const count = annotationCount(map);
    const safeName = escapeHtml(map.name);
    const safeUsername = escapeHtml(map.username || 'Aventurier');
    const card = document.createElement('article');
    card.className = 'app-map-card';
    card.addEventListener('click', () => openMap(map.id));
    card.innerHTML = `
      <div class="app-map-thumb"></div>
      <div class="app-map-body">
        <div class="app-map-title" title="${safeName}">${safeName}</div>
        <div class="app-map-meta">Par ${safeUsername} · Modifiée le ${fmtDate(map.updatedAt)}</div>
        <div class="app-tags">
          <span class="app-tag">${count} annotation${count !== 1 ? 's' : ''}</span>
          <span class="app-tag public">Public</span>
        </div>
      </div>
      <div class="app-card-actions one">
        <button class="btn-card" onclick="event.stopPropagation(); openMap('${map.id}')" type="button">Voir la carte</button>
      </div>`;
    grid.appendChild(card);
  });
}

(async () => {
  const authArea = document.getElementById('auth-area');
  const user = await window.DofusApi.currentUser();
  if (user) {
    authArea.innerHTML = `
      <div class="user-chip"><span class="user-chip-label">Compte</span><strong>${user.username}</strong></div>
      <button class="btn-topbar btn-logout" onclick="logout()" type="button">Déconnexion</button>`;
  } else {
    authArea.innerHTML = `<a href="login.html" class="btn-topbar btn-login">Connexion</a>`;
  }

  allMaps = await window.DofusApi.listPublicMaps().catch(() => []);
  renderMaps(allMaps);
})();

document.getElementById('map-search').addEventListener('input', () => renderMaps(filteredMaps()));

async function logout() {
  await window.DofusApi.logout();
  window.location.reload();
}

window.openMap = openMap;
window.logout = logout;
</script>
</body>
</html>
