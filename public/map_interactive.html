<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dofus Rétro 1.29 - Carte Interactive</title>
<style>
  * { margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: #111;
    font-family: "Gill Sans", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  #viewport {
    position: fixed; inset: 0;
    overflow: hidden; cursor: grab;
  }
  #viewport.grabbing { cursor: grabbing; }

  #map-container {
    position: absolute; top: 0; left: 0;
    background-image: url('img/map 1.29.jpg');
    background-color: #E8DBC8;
    background-repeat: no-repeat;
    background-size: auto;
    width: 5359px;
    will-change: transform;
  }

  table { border-spacing: 0; border-collapse: collapse; }
  table, tr, td { top: 0; left: 0; margin: 0; padding: 0; }
  td {
    border-right: 2px solid #B8B18F;
    border-bottom: 2px solid #B8B18F;
    height: 21px !important;
    cursor: crosshair;
    box-sizing: content-box;
  }
  td:nth-child(-n+41) { width: 37px; }
  td:nth-child(n+42)  { width: 38px; }
  td:hover    { background-color: rgba(145, 62, 176, 0.35); }
  td.selected { background-color: rgba(145, 62, 176, 0.55) !important; }

  /* ── UI overlays ── */
  #tooltip {
    position: fixed; z-index: 200; display: none;
    background-color: rgba(0,0,0,0.72); color: #fff;
    border-radius: 6px; padding: 4px 9px; font-size: 13px;
    pointer-events: none; white-space: nowrap;
  }

  #hud {
    position: fixed; top: 0; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background-color: #58533A; color: #BFB07B;
    font-weight: bold; font-size: 14px;
    padding: 6px 22px;
    border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;
    pointer-events: none;
  }

  #coords-bar {
    position: fixed; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background-color: rgba(88,83,58,0.88);
    color: #BFB07B; font-weight: bold; font-size: 13px;
    padding: 5px 14px; border-radius: 5px;
    pointer-events: none;
  }

  #search-box {
    position: fixed; top: 0; left: 0; z-index: 100;
    background-color: #58533A;
    border-bottom-right-radius: 6px;
    padding: 5px 8px; display: flex; gap: 5px; align-items: center;
  }
  #search-box label { color: #BFB07B; font-size: 13px; font-weight: bold; }
  #search-box input {
    background: #BFB07B; border: none; border-radius: 3px;
    padding: 2px 5px; width: 52px; font-size: 13px;
    text-align: center; color: #333;
  }
  #go-btn {
    background: #BFB07B; border: none; border-radius: 3px;
    padding: 2px 9px; cursor: pointer;
    font-size: 13px; font-weight: bold; color: #58533A;
  }
  #go-btn:hover { background: #d4c48a; }

  /* Boutons droite */
  .btn-top-right {
    position: fixed; top: 0; z-index: 100;
    background-color: #58533A; color: #BFB07B;
    font-weight: bold; font-size: 12px;
    padding: 6px 12px; border-bottom-left-radius: 6px;
    cursor: pointer; border: none; text-decoration: none;
    display: inline-flex; align-items: center;
    white-space: nowrap;
  }
  .btn-top-right:hover { background-color: #6e6849; }
  #home-btn  { right: 0; }
  #back-btn  { right: 76px; border-bottom-right-radius: 6px; border-bottom-left-radius: 0; color: #BFB07B; }
  #user-btn  { right: 170px; background-color: #3A3520; border-bottom-right-radius: 6px; border-bottom-left-radius: 0; pointer-events: none; }

  @media (max-width: 760px) {
    #hud {
      top: 42px;
      width: min(92vw, 360px);
      text-align: center;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 0 0 6px 6px;
    }
    #search-box {
      right: 0;
      border-bottom-right-radius: 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    #search-box input { width: 44px; }
    .btn-top-right {
      top: auto;
      bottom: 0;
      border-radius: 6px 6px 0 0;
      padding: 7px 10px;
    }
    #home-btn { right: 0; }
    #back-btn { right: 78px; }
    #user-btn { display: none !important; }
    #coords-bar {
      bottom: 42px;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  }
</style>
</head>
<body>

<div id="viewport">
  <div id="map-container">
    <table id="map-table"><tbody id="map-body"></tbody></table>
  </div>
</div>

<div id="hud">Dofus Rétro 1.29 — Carte Interactive</div>
<div id="search-box">
  <label>X</label><input id="sx" type="number" value="0" min="-91" max="43">
  <label>Y</label><input id="sy" type="number" value="0" min="-120" max="48">
  <button id="go-btn">Aller</button>
</div>

<span id="user-btn" class="btn-top-right" style="display:none"></span>
<a href="index.html" id="back-btn" class="btn-top-right">← Accueil</a>
<button id="home-btn" class="btn-top-right">[ 0, 0 ]</button>

<div id="tooltip"></div>
<div id="coords-bar">Survolez une case</div>

<script type="module">
import './js/supabase-api.js';

(function () {
  /* Affiche l'utilisateur connecté */
  window.DofusApi.currentUser().then(user => {
    if (user) {
      const btn = document.getElementById('user-btn');
      btn.textContent = '⚔ ' + user.username;
      btn.style.display = 'inline-flex';
      document.getElementById('back-btn').style.right = '170px';
    }
  });

  const X_MIN = -91, X_MAX = 43;
  const Y_MIN = -120, Y_MAX = 48;
  const COLS = X_MAX - X_MIN + 1;
  const ROWS = Y_MAX - Y_MIN + 1;
  const PITCH_N = 39, PITCH_W = 40, ROW_PITCH = 23;

  const colLeft = [0];
  for (let c = 1; c < COLS; c++)
    colLeft[c] = colLeft[c - 1] + (c - 1 < 41 ? PITCH_N : PITCH_W);

  function cellCenter(ci, ri) {
    return {
      cx: colLeft[ci] + (ci < 41 ? 37 : 38) / 2,
      cy: ri * ROW_PITCH + 21 / 2
    };
  }

  /* Build table */
  const tbody = document.getElementById('map-body');
  const frag  = document.createDocumentFragment();
  for (let ri = 0; ri < ROWS; ri++) {
    const tr = document.createElement('tr');
    for (let ci = 0; ci < COLS; ci++) {
      const td = document.createElement('td');
      td.dataset.x = X_MIN + ci;
      td.dataset.y = Y_MIN + ri;
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);

  /* Pan */
  const mc = document.getElementById('map-container');
  let tx = 0, ty = 0;

  function applyTransform() { mc.style.transform = `translate(${tx}px,${ty}px)`; }

  function centerOn(x, y) {
    const ci = x - X_MIN, ri = y - Y_MIN;
    if (ci < 0 || ci >= COLS || ri < 0 || ri >= ROWS) return;
    const { cx, cy } = cellCenter(ci, ri);
    tx = Math.round(window.innerWidth  / 2 - cx);
    ty = Math.round(window.innerHeight / 2 - cy);
    applyTransform();
  }

  const vp = document.getElementById('viewport');
  let dragging = false, dragMoved = false, ox, oy, tx0, ty0;

  vp.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; dragMoved = false;
    ox = e.clientX; oy = e.clientY; tx0 = tx; ty0 = ty;
    vp.classList.add('grabbing'); e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - ox, dy = e.clientY - oy;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    tx = tx0 + dx; ty = ty0 + dy; applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; vp.classList.remove('grabbing'); });

  /* Tooltip */
  const tooltip   = document.getElementById('tooltip');
  const coordsBar = document.getElementById('coords-bar');
  let selectedCell = null;

  document.getElementById('map-table').addEventListener('mouseover', e => {
    const td = e.target.closest('td[data-x]');
    if (!td) return;
    tooltip.textContent = `[${td.dataset.x}, ${td.dataset.y}]`;
    tooltip.style.display = 'block';
    coordsBar.textContent = `[${td.dataset.x}, ${td.dataset.y}]`;
  });
  document.getElementById('map-table').addEventListener('mouseout', e => {
    if (!e.target.closest('td[data-x]')) return;
    tooltip.style.display = 'none';
    coordsBar.textContent = 'Survolez une case';
  });
  window.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 30) + 'px';
  });

  document.getElementById('map-table').addEventListener('click', e => {
    if (dragMoved) return;
    const td = e.target.closest('td[data-x]');
    if (!td) return;
    if (selectedCell) selectedCell.classList.remove('selected');
    selectedCell = td; td.classList.add('selected');
  });

  document.getElementById('home-btn').addEventListener('click', () => centerOn(0, 0));
  document.getElementById('go-btn').addEventListener('click', () => {
    const x = parseInt(document.getElementById('sx').value);
    const y = parseInt(document.getElementById('sy').value);
    if (!isNaN(x) && !isNaN(y)) centerOn(x, y);
  });
  ['sx', 'sy'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('go-btn').click();
    })
  );

  requestAnimationFrame(() => requestAnimationFrame(() => centerOn(0, 0)));
})();
</script>
</body>
</html>
