<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dofus Retro - Connexion</title>
<link rel="stylesheet" href="css/theme.css">
</head>
<body class="login-page">
<main class="login-shell">
  <section class="login-visual" aria-label="Dofus Retro">
    <img src="img/map 1.29.jpg" alt="Carte du Monde des Douze">
    <div class="login-copy">
      <span class="app-eyebrow">Dofus Retro</span>
      <h1>Retrouvez vos cartes avant de repartir en chasse.</h1>
      <p>Connexion rapide, cartes sauvegardées et repères prêts pour votre prochaine session.</p>
    </div>
  </section>

  <section class="login-card" aria-label="Connexion">
    <button id="theme-toggle" class="theme-toggle login-theme-toggle" type="button" data-theme-toggle="true" aria-label="Activer le mode nuit">☀</button>
    <div class="login-header">
      <span class="app-eyebrow">Compte</span>
      <h2>Dofus Retro</h2>
      <p>Monde des Douze · Fan Site</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')" type="button">Connexion</button>
      <button class="tab-btn" onclick="switchTab('register')" type="button">Créer un compte</button>
    </div>

    <div id="tab-login" class="tab-content active">
      <div class="form-group">
        <label for="login-id">Adresse e-mail</label>
        <input id="login-id" type="email" placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-pw">Mot de passe</label>
        <input id="login-pw" type="password" placeholder="Votre mot de passe" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()" type="button">Se connecter</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <div id="tab-register" class="tab-content">
      <div class="form-group">
        <label for="reg-username">Pseudo</label>
        <input id="reg-username" type="text" placeholder="Votre pseudo" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="reg-email">Adresse e-mail</label>
        <input id="reg-email" type="email" placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-pw">Mot de passe</label>
        <input id="reg-pw" type="password" placeholder="Minimum 6 caractères" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="reg-pw2">Confirmer le mot de passe</label>
        <input id="reg-pw2" type="password" placeholder="Répétez votre mot de passe" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()" type="button">Créer mon compte</button>
      <div class="msg" id="register-msg"></div>
    </div>

    <a href="index.html" class="back-link">Retour à l'accueil</a>
  </section>
</main>

<script src="js/theme-toggle.js" defer></script>
<script type="module">
import './js/supabase-api.js';

window.DofusApi.currentUser().then(user => {
  if (user) window.location.href = 'index.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((button, index) =>
    button.classList.toggle('active', (index === 0) === (tab === 'login'))
  );
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

function showMsg(id, text, type) {
  const element = document.getElementById(id);
  element.textContent = text;
  element.className = `msg ${type}`;
  element.style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  const identifier = document.getElementById('login-id').value.trim();
  const password = document.getElementById('login-pw').value;

  if (!identifier || !password) return showMsg('login-msg', 'Remplissez tous les champs.', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(identifier)) {
    return showMsg('login-msg', 'Connectez-vous avec votre adresse e-mail.', 'error');
  }

  btn.disabled = true;
  btn.textContent = 'Connexion...';

  const data = await window.DofusApi.login(identifier, password);

  if (data.ok) {
    showMsg('login-msg', `Bienvenue, ${data.username} !`, 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } else {
    showMsg('login-msg', data.error, 'error');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

async function doRegister() {
  const btn = document.getElementById('btn-register');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pw').value;
  const password2 = document.getElementById('reg-pw2').value;

  if (password !== password2) return showMsg('register-msg', 'Les mots de passe ne correspondent pas.', 'error');

  btn.disabled = true;
  btn.textContent = 'Création...';

  const data = await window.DofusApi.register(username, email, password);

  if (data.ok) {
    if (data.needsEmailConfirmation) {
      showMsg('register-msg', data.message || 'Compte créé. Vérifiez votre e-mail avant de vous connecter.', 'success');
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
      return;
    }
    showMsg('register-msg', `Compte créé ! Bienvenue, ${data.username} !`, 'success');
    setTimeout(() => window.location.href = 'index.html', 900);
  } else {
    showMsg('register-msg', data.error, 'error');
    btn.disabled = false;
    btn.textContent = 'Créer mon compte';
  }
}

document.addEventListener('keydown', event => {
  if (event.key !== 'Enter') return;
  const loginActive = document.getElementById('tab-login').classList.contains('active');
  if (loginActive) doLogin(); else doRegister();
});

window.switchTab = switchTab;
window.doLogin = doLogin;
window.doRegister = doRegister;
</script>
</body>
</html>
